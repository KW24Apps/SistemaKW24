<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Embed Portal</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f0f0f0; }
    textarea { width: 100%; height: 80px; font-family: monospace; font-size: 13px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 10px 24px; background: #0d6efd; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    #resultado { margin-top: 20px; border: 1px solid #ccc; background: #fff; min-height: 820px; }
  </style>
</head>
<body>
  <h3>Teste de Embed — Portal do Cliente</h3>
  <textarea id="codigo" placeholder='Cole o código <iframe ...> aqui'></textarea>
  <br>
  <button onclick="renderizar()">Renderizar</button>
  <div id="resultado"></div>

  <script>
    function renderizar() {
      var codigo = document.getElementById('codigo').value.trim();
      document.getElementById('resultado').innerHTML = codigo;
    }

    // Auto-preenche se vier na URL ?embed=...
    var params = new URLSearchParams(location.search);
    if (params.get('embed')) {
      document.getElementById('codigo').value = decodeURIComponent(params.get('embed'));
      renderizar();
    }
  </script>
</body>
</html>
